services:
  embedder:
    build:
      context: .
      dockerfile: services/embedder/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data
      - .:/app
    restart: unless-stopped

  retriever-api:
    build:
      context: .
      dockerfile: services/retriever/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - .:/app

  retriever:
    build:
      context: .
      dockerfile: services/retriever/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["python", "-m", "services.retriever.main"]
    stdin_open: true
    tty: true
    profiles: ["cli"]
    volumes:
      - ./data:/app/data
      - .:/app

  webui:
    build:
      context: .
      dockerfile: webui/Dockerfile
    depends_on:
      retriever-api:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./webui:/app/webui

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.15.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
  postgres_data:
